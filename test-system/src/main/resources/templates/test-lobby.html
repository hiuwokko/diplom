<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Приєднатися до тесту</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .lobby-card { background: white; border-radius: 20px; box-shadow: 0 12px 40px rgba(0,0,0,0.1); padding: 40px; max-width: 450px; width: 100%; text-align: center; }
        .btn-go { background-color: #8fae87; color: white; border-radius: 30px; padding: 12px; font-weight: bold; width: 100%; border: none; }
        .btn-go:hover { background-color: #76946f; }
    </style>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍃</text></svg>">
</head>
<body>

<div class="lobby-card">
    <h2 class="mb-3" style="color: #55704f;">📋 Готові до тесту?</h2>
    <h5 class="text-muted mb-4" th:text="${test.title}">Назва тесту</h5>
    
    <form th:action="@{/test/start-session/{id}(id=${test.id})}" method="post">
        <div class="mb-3">
            <input type="text" name="firstName" class="form-control form-control-lg" placeholder="Введіть ваше Ім'я" required th:value="${prefilledFirstName}">
        </div>
        <div class="mb-4">
            <input type="text" name="lastName" class="form-control form-control-lg" placeholder="Введіть ваше Прізвище" required th:value="${prefilledLastName}">
        </div>
        <button type="submit" class="btn btn-go shadow-sm">🚀 ПОЧАТИ ТЕСТ</button>
    </form>
</div>

</body>
</html>
