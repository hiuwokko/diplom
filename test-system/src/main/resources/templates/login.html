<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Вхід в особистий кабінет</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(180deg, #d3e0d7 0%, #e2ebd5 60%, #a3c29b 100%) no-repeat center center fixed; 
            background-size: cover;
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #4a574a;
        }
        .auth-card { 
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 20px; 
            box-shadow: 0 12px 40px rgba(74, 87, 74, 0.15); 
            width: 100%; 
            max-width: 450px; 
            padding: 40px 35px; 
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .brand-title { 
            color: #5a755a; 
            font-weight: 700; 
            font-size: 1.8rem; 
            text-align: center; 
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }
        .brand-subtitle {
            text-align: center;
            color: #839783;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }
        .btn-submit { 
            background-color: #8fae87; 
            color: white; 
            font-weight: bold; 
            width: 100%; 
            padding: 12px; 
            border: none; 
            border-radius: 30px; 
            transition: all 0.3s ease; 
        }
        .btn-submit:hover { 
            background-color: #76946f; 
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(118, 148, 111, 0.3);
        }
        .form-control { 
            border-radius: 30px; 
            padding: 11px 20px; 
            border: 1px solid #c2d1c2; 
            background-color: #fafdFA;
        }
        .form-control:focus { 
            box-shadow: 0 0 0 4px rgba(143, 174, 135, 0.25); 
            border-color: #8fae87; 
        }
        .switch-link { 
            text-align: center; 
            margin-top: 25px; 
            font-size: 0.9rem; 
        }
        .switch-link a { 
            color: #6e8c68; 
            text-decoration: none; 
            font-weight: 600; 
        }
    </style>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍃</text></svg>">
</head>
<body>

<div class="auth-card">
    <div class="brand-title">ВІТАЄМО В НАШОМУ ПРОСТОРІ</div>
    <div class="brand-subtitle">Особистий кабінет тестування</div>

    <form th:action="@{/login}" method="post">
        
        <div th:if="${error}" class="alert alert-danger text-center" role="alert" th:text="${error}"></div>
        
        <div class="mb-3">
            <label class="form-label text-secondary small fw-bold px-2">Електронна пошта</label>
            <input type="email" name="email" class="form-control" placeholder="Введіть ваш Email" required>
        </div>
        
        <div class="mb-4">
            <label class="form-label text-secondary small fw-bold px-2">Пароль</label>
            <input type="password" name="password" class="form-control" placeholder="Введіть пароль" required>
        </div>
        
        <button type="submit" class="btn btn-submit shadow-sm">УВІЙТИ</button>
    </form>

    <div class="switch-link">
        <a href="/register">Зареєструватися</a> / <span class="text-muted">В мене є код від вчителя</span>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
