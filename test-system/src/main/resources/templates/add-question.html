<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Конструктор тесту</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(180deg, #d3e0d7 0%, #e2ebd5 60%, #a3c29b 100%) no-repeat center center fixed; background-size: cover; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #4a574a; min-height: 100vh; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 8px 32px rgba(74, 87, 74, 0.08); }
        .settings-card { background: rgba(255, 255, 255, 0.8); border: 1px solid #cbdcc7; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .main-header { border-top: 8px solid #8fae87; }
        .question-block { background: rgba(255, 255, 255, 0.8); border-radius: 20px; border-left: 6px solid #a3c29b; position: relative; }
        .form-style { border: none; border-bottom: 2px solid #cbdcc7; border-radius: 0; background: transparent; }
        .form-style:focus { box-shadow: none; border-bottom: 2px solid #8fae87; }
        .form-select-style { border: none; border-bottom: 2px solid #cbdcc7; border-radius: 0; background-color: transparent; color: #4a574a; font-weight: 500; }
        .btn-save { background-color: #8fae87; color: white; border-radius: 30px; padding: 12px 30px; font-weight: bold; border: none; }
        .btn-save:hover { background-color: #76946f; }
        .btn-add { background-color: white; color: #8fae87; border: 2px solid #8fae87; border-radius: 30px; font-weight: bold; }
        .media-section { background: rgba(234, 242, 232, 0.5); border-radius: 15px; padding: 15px; border: 1px dashed #a3c29b; }
        .audience-badge { cursor: pointer; border: 1px solid #cbdcc7; background: white; padding: 6px 15px; border-radius: 20px; font-size: 0.85rem; transition: all 0.2s; }
        .audience-radio:checked + .audience-badge { background: #8fae87; color: white; border-color: #8fae87; }
    </style>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍃</text></svg>">
</head>
<body>
<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-9">
           
            <form action="/add-test-with-questions" method="post" enctype="multipart/form-data" onsubmit="prepareCategorySubmit()">
                
                <div class="glass-panel main-header p-5 mb-4 shadow-sm">
                    <a href="/" class="text-decoration-none small text-success mb-3 d-inline-block">← Повернутися назад</a>
                    
                    <input type="text" name="title" class="form-control form-style fs-2 fw-bold mb-4" placeholder="Назва вашого тесту..." required>
                    
                    <div class="settings-card">
                        <div class="form-check form-switch mb-2">
                            <input class="form-check-input" type="checkbox" name="hideAnswers" id="hideAnswersSwitch">
                            <label class="form-check-label fw-bold text-success" for="hideAnswersSwitch">🔒 Приховати правильні відповіді від учнів</label>
                        </div>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" name="published" id="publishedSwitch" checked>
                            <label class="form-check-label fw-bold text-primary" for="publishedSwitch">🌐 Опублікувати тест (доступний всім)</label>
                        </div>
                    </div>

                    <textarea name="description" class="form-control form-style text-muted mb-4" placeholder="Короткий опис або правила для студентів..." rows="2"></textarea>
                    
                    <div class="row g-4">
                        <div class="col-md-6">
                            <div class="d-flex align-items-center bg-white p-2 rounded-pill px-3 mb-2" style="border: 1px solid #cbdcc7;">
                                <span class="me-2">📚</span>
                                <label class="fw-bold text-secondary small me-2 mb-0" style="white-space: nowrap;">Предмет:</label>
                                <select id="categorySelect" class="form-select form-select-style p-0" onchange="toggleCustomCategory()" required>
                                    <option value="Математика">Математика</option>
                                    <option value="Хімія">Хімія</option>
                                    <option value="Географія">Географія</option>
                                    <option value="Фізика">Фізика</option>
                                    <option value="Біологія">Біологія</option>
                                    <option value="Інформатика">Інформатика</option>
                                    <option value="Історія">Історія</option>
                                    <option value="Інше">Інше...</option>
                                </select>
                            </div>
                            <div id="customCategoryBlock" class="mt-2" style="display: none;">
                                <input type="text" id="customCategoryInput" class="form-control form-style ps-3" placeholder="Введіть назву предмета...">
                            </div>
                            <input type="hidden" name="category" id="finalCategory">
                        </div>

                        <div class="col-md-6">
                            <div class="d-flex align-items-center bg-white p-2 rounded-pill px-3" style="border: 1px solid #cbdcc7;">
                                <span class="me-2">⏱</span>
                                <label class="fw-bold text-secondary small me-2 mb-0" style="white-space: nowrap;">Час (хв):</label>
                                <input type="number" name="timeLimit" class="form-control border-0 fw-bold p-0" value="10" min="1" max="180" required style="color: #8fae87;">
                            </div>
                        </div>

                        <div class="col-12">
                            <div class="bg-white p-3 rounded-4 shadow-sm" style="border: 1px solid #cbdcc7;">
                                <div class="fw-bold text-secondary small mb-3">🎯 Призначено для (аудиторія):</div>
                                <div class="d-flex flex-wrap gap-2">
                                    <script>
                                        for (let i = 1; i <= 12; i++) {
                                            document.write(`
                                                <label class="position-relative">
                                                    <input type="radio" name="targetAudience" value="${i} клас" class="position-absolute opacity-0 audience-radio" ${i === 10 ? 'checked' : ''}>
                                                    <span class="audience-badge d-inline-block">${i} клас</span>
                                                </label>
                                            `);
                                        }
                                    </script>
                                    <label class="position-relative">
                                        <input type="radio" name="targetAudience" value="Студенти" class="position-absolute opacity-0 audience-radio">
                                        <span class="audience-badge d-inline-block">🎓 Студенти</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="questionsContainer"></div>

                <div class="d-flex justify-content-between mt-4">
                    <button type="button" class="btn btn-add px-4 shadow-sm" onclick="addQuestionField()">➕ Нове запитання</button>
                    <button type="submit" class="btn btn-save shadow-sm px-5">ЗБЕРЕГТИ ТЕСТ</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    let questionCount = 0;
   
    function toggleCustomCategory() {
        const select = document.getElementById('categorySelect');
        const customBlock = document.getElementById('customCategoryBlock');
        const customInput = document.getElementById('customCategoryInput');
        if (select.value === 'Інше') {
            customBlock.style.display = 'block';
            customInput.required = true;
        } else {
            customBlock.style.display = 'none';
            customInput.required = false;
        }
    }

    function prepareCategorySubmit() {
        const select = document.getElementById('categorySelect');
        const customInput = document.getElementById('customCategoryInput');
        const finalCategory = document.getElementById('finalCategory');
        finalCategory.value = (select.value === 'Інше') ? customInput.value.trim() : select.value;
    }

    function addQuestionField() {
        const container = document.getElementById('questionsContainer');
        const currentId = questionCount;
        const html = `
            <div class="glass-panel question-block p-4 mb-4 shadow-sm" id="question_${currentId}">
                <button type="button" class="btn-close position-absolute top-0 end-0 m-4" onclick="document.getElementById('question_${currentId}').remove()"></button>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold m-0" style="color: #8fae87;">Запитання №${currentId + 1}</h5>
                    <div class="d-flex align-items-center bg-white px-3 py-1 rounded-pill shadow-sm" style="border: 1px solid #cbdcc7; width: 120px;">
                        <span class="me-2 text-warning" style="font-size: 0.85rem;">⭐</span>
                        <label class="small text-muted mb-0 me-2" style="font-size: 0.75rem;">Бали:</label>
                        <input type="number" name="points_${currentId}" class="form-control border-0 p-0 fw-bold text-center" value="1" min="1" max="100" required style="color: #4a574a; font-size: 0.9rem;">
                    </div>
                </div>
                <input type="text" name="questionText_${currentId}" class="form-control form-style fw-bold mb-4" placeholder="Введіть текст запитання тут..." required>
                <div class="media-section mb-4">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-secondary" style="font-size: 0.8rem;">📸 Зображення</label>
                            <input type="file" name="imageFile_${currentId}" class="form-control form-control-sm mb-2" accept="image/*">
                            <input type="text" name="imageUrl_${currentId}" class="form-control form-control-sm" placeholder="Або вставте URL-посилання...">
                        </div>
                    </div>
                </div>
                <p class="small text-muted fw-bold mb-2" style="font-size: 0.8rem;">Варіанти відповідей (відмітьте правильні):</p>
                <div class="row g-3" id="options_container_${currentId}">
                    <div class="col-md-6 d-flex align-items-center option-item">
                        <input type="checkbox" name="correctAnswers_${currentId}" value="A" class="form-check-input me-3" style="width: 20px; height: 20px; border-color: #a3c29b;">
                        <input type="text" name="optionA_${currentId}" class="form-control bg-white" placeholder="Варіант А" required style="border-radius: 12px; font-size: 0.95rem;">
                    </div>
                    <div class="col-md-6 d-flex align-items-center option-item">
                        <input type="checkbox" name="correctAnswers_${currentId}" value="B" class="form-check-input me-3" style="width: 20px; height: 20px; border-color: #a3c29b;">
                        <input type="text" name="optionB_${currentId}" class="form-control bg-white" placeholder="Варіант B" required style="border-radius: 12px; font-size: 0.95rem;">
                    </div>
                </div>
                <div class="mt-3">
                    <button type="button" class="btn btn-sm p-0 border-0 text-success fw-bold d-flex align-items-center gap-1" style="font-size: 0.85rem; background: transparent; outline: none;" onclick="addUnlimitedOption(${currentId})">
                        <span style="font-size: 1.1rem; line-height: 1;">+</span> Додати варіант відповіді
                    </button>
                </div>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', html);
        questionCount++;
    }

    function addUnlimitedOption(qId) {
        const container = document.getElementById(`options_container_${qId}`);
        const currentOptionsCount = container.getElementsByClassName('option-item').length;
        
        if (currentOptionsCount >= 4) {
            alert("Максимальна кількість варіантів відповідей - 4 (A, B, C, D)");
            return;
        }

        const nextLetter = String.fromCharCode(65 + currentOptionsCount);
        const htmlOption = `
            <div class="col-md-6 d-flex align-items-center option-item" id="opt_${nextLetter}_${qId}">
                <input type="checkbox" name="correctAnswers_${qId}" value="${nextLetter}" class="form-check-input me-3" style="width: 20px; height: 20px; border-color: #a3c29b;">
                <div class="input-group">
                    <input type="text" name="option${nextLetter}_${qId}" class="form-control bg-white" placeholder="Варіант ${nextLetter}" style="border-radius: 12px 0 0 12px; font-size: 0.95rem;">
                    <button type="button" class="btn btn-outline-danger btn-sm px-2" style="border-radius: 0 12px 12px 0;" onclick="document.getElementById('opt_${nextLetter}_${qId}').remove()">✕</button>
                </div>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', htmlOption);
    }
    
    window.onload = addQuestionField;
</script>
</body>
</html>
