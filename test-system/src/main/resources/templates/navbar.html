<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm py-3" th:fragment="navbar">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🍃 Знань Простір </a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <form action="/" method="get" class="mx-auto my-2 my-lg-0 d-flex">
                <input type="text" name="keyword" class="form-control me-2" placeholder="🔍 Пошук тесту..." th:value="${keyword}">
                <button class="btn btn-outline-light" type="submit">Знайти</button>
            </form>

            <div class="d-flex align-items-center gap-3">
                
                <div th:if="${user == null}">
                    <a href="/login" class="btn btn-outline-light">Увійти</a>
                    <a href="/register" class="btn btn-light text-success fw-bold">Реєстрація</a>
                </div>

                <div th:if="${user != null}" class="d-flex align-items-center gap-3">
                    <a href="/add-question" class="btn btn-light fw-bold text-success">+ Новий тест</a>
                    
                    <div class="dropdown">
                        <button class="btn btn-outline-light dropdown-toggle d-flex align-items-center" type="button" data-bs-toggle="dropdown">
                            
                           
                            <img th:if="${user.avatarUrl != null and !user.avatarUrl.isEmpty()}" 
                                 th:src="${user.avatarUrl}" 
                                 alt="Avatar" 
                                 style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 2px solid white; margin-right: 8px;">
                            
                            
                            <span th:if="${user.avatarUrl == null or user.avatarUrl.isEmpty()}" 
                                  style="width: 32px; height: 32px; border-radius: 50%; background: white; color: #8fae87; display: inline-flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; margin-right: 8px;">
                                <span th:text="${user.firstName.charAt(0)}"></span>
                            </span>
                            
                            <span th:text="${user.firstName}">Користувач</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="/profile">👤 Мої тести та результати</a></li>
                            <li><a class="dropdown-item" href="/account">⚙️ Налаштування акаунта</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="/logout">🚪 Вийти</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
