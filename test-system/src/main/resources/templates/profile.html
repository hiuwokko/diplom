<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%); min-height: 100vh; }
        .card { background: rgba(255, 255, 255, 0.9) !important; backdrop-filter: blur(5px); border-radius: 15px; }
        .status-badge { font-size: 0.75rem; padding: 2px 8px; border-radius: 10px; }
    </style>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍃</text></svg>">
</head>
<body>

<div th:replace="~{navbar :: navbar}"></div>

<div class="container mt-5">
    <div class="card p-4 shadow-sm">
        <h2>Особистий кабінет: <span th:text="${user.firstName}"></span></h2>
        
        <ul class="nav nav-tabs mt-3">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#created">Мої тести</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#passed">Історія результатів</button></li>
        </ul>

        <div class="tab-content p-3">
          
            <div class="tab-pane fade show active" id="created">
                <div th:if="${myTests.isEmpty()}" class="text-muted">У вас ще немає створених тестів.</div>
                
                <div th:each="test : ${myTests}" class="border-bottom p-3 d-flex justify-content-between align-items-center">
                    <div>
                        <strong th:text="${test.title}">Назва</strong>
                        <span th:if="${test.published}" class="badge bg-success status-badge ms-2">Опубліковано</span>
                        <span th:unless="${test.published}" class="badge bg-secondary status-badge ms-2">Чернетка</span>
                    </div>
                    <div class="d-flex gap-2">
                        
                        <a th:href="@{/test/lobby/{id}(id=${test.id})}" class="btn btn-sm btn-outline-success">Переглянути</a>
                        
                     
                        <a th:href="@{/test/teacher-results/{id}(id=${test.id})}" class="btn btn-sm btn-info text-white">📊 Результати</a>
                        
                        
                        <form th:action="@{/test/delete/{id}(id=${test.id})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Видалити</button>
                        </form>
                    </div>
                </div>
            </div>

           
            <div class="tab-pane fade" id="passed">
                <div th:if="${passedResults.isEmpty()}" class="text-muted">Ви ще не проходили тестів.</div>
                
                <div th:each="res : ${passedResults}" class="border-bottom p-2 d-flex justify-content-between align-items-center">
                    <span th:text="${res.test.title}">Назва тесту</span>
                    <b><span th:text="${res.percentage}"></span>%</b>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
