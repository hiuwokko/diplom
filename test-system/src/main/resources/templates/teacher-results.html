<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Керування тестом</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; }
        .result-table-card { background: white; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); padding: 30px; }
        .link-box { background: #e8f5e9; padding: 15px; border-radius: 10px; border: 2px dashed #8fae87; }
        .chart-container { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
    </style>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍃</text></svg>">
</head>
<body>

<div th:replace="~{navbar :: navbar}"></div>

<div class="container mt-5 mb-5">
    <div class="result-table-card" data-aos="fade-up">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 class="fw-bold m-0">📋 Керування: <span th:text="${test.title}"></span></h3>
                <p class="text-muted small mb-0">Статус: <b th:text="${test.status}"></b></p>
            </div>
            <div class="d-flex gap-2">
                <form th:if="${test.status == 'WAITING'}" th:action="@{/test/start-teacher/{id}(id=${test.id})}" method="post">
                    <button type="submit" class="btn btn-success btn-lg"> ПОЧАТИ ТЕСТ</button>
                </form>
                <form th:if="${test.status == 'IN_PROGRESS'}" th:action="@{/test/close-teacher/{id}(id=${test.id})}" method="post">
                    <button type="submit" class="btn btn-danger btn-lg">🛑 ЗАВЕРШИТИ ТЕСТ</button>
                </form>
                <a href="/profile" class="btn btn-secondary">Закрити</a>
            </div>
        </div>

        <div class="link-box mb-4" th:if="${test.status != 'CLOSED'}">
            <h5>🔗 Посилання для учнів:</h5>
            <div class="input-group">
                <!-- ВИПРАВЛЕННЯ: Беремо посилання з контролера -->
                <input type="text" class="form-control" id="testLink" readonly th:value="${fullLink}">
                <button class="btn btn-primary" onclick="copyLink()"><i class="fas fa-copy me-1"></i> Копіювати</button>
            </div>
            <p class="mt-2 mb-0">Код: <b class="text-success fs-4" th:text="${test.testCode}"></b></p>
        </div>

        <div class="table-responsive">
            <h4><i class="fas fa-users text-success me-2"></i>Учасники та результати:</h4>
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Прізвище</th>
                        <th>Ім'я</th>
                        <th>Статус / Результат</th>
                    </tr>
                </thead>
                <tbody id="resultsTableBody">
                    <tr><td colspan="3" class="text-center text-muted py-4">Завантаження даних...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

   
    <div class="row mt-4">
        <div class="col-md-6 mx-auto" data-aos="zoom-in">
            <div class="chart-container text-center">
                <h5 class="fw-bold mb-3"><i class="fas fa-chart-pie text-success me-2"></i>Аналіз результатів</h5>
                <canvas id="resultsChart" width="300" height="300"></canvas>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- Chart.js -->

<script th:inline="javascript">
    AOS.init();

    const testId = /*[[${test.id}]]*/ 0;
    const testStatus = /*[[${test.status}]]*/ 'ACTIVE';
    const initialResults = /*[[${results}]]*/ [];

    function copyLink() {
        const copyText = document.getElementById("testLink");
        copyText.select();
        copyText.setSelectionRange(0, 99999); // For mobile devices
        navigator.clipboard.writeText(copyText.value);
        alert("Посилання скопійовано: " + copyText.value);
    }

    
    setInterval(async () => {
        try {
            if (testStatus === 'WAITING') {
                const response = await fetch(`/api/tests/${testId}/lobby-users`);
                const users = await response.json();
                let html = '';
                if (users.length === 0) {
                    html = '<tr><td colspan="3" class="text-center text-muted py-4">Очікуємо учнів...</td></tr>';
                } else {
                    users.forEach(u => {
                        html += `<tr><td class="fw-bold">${u.studentLastName || '---'}</td><td>${u.studentFirstName || '---'}</td><td><span class="badge bg-warning text-dark">⏳ У лобі</span></td></tr>`;
                    });
                }
                document.getElementById('resultsTableBody').innerHTML = html;
            } else {
                const response = await fetch(`/api/tests/${testId}/results`);
                const results = await response.json();
                let html = '';
                results.forEach(r => {
                    if (r.percentage >= 0) { 
                        const statusBadge = r.percentage >= 60 ? '<span class="badge bg-success">Зараховано</span>' : '<span class="badge bg-danger">Не зараховано</span>';
                        html += `<tr><td class="fw-bold">${r.studentLastName || '---'}</td><td>${r.studentFirstName || '---'}</td><td><b>${r.percentage}%</b> ${statusBadge}</td></tr>`;
                    }
                });
                document.getElementById('resultsTableBody').innerHTML = html;
            }
        } catch (e) { console.error("Помилка оновлення", e); }
    }, 2000); 


    function renderChart(resultsData) {
        let passed = 0;
        let failed = 0;

        resultsData.forEach(r => {
            if (r.percentage >= 0) {
                if (r.percentage >= 60) passed++;
                else failed++;
            }
        });

        const ctx = document.getElementById('resultsChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Зараховано', 'Не зараховано'],
                datasets: [{
                    data: [passed, failed],
                    backgroundColor: ['#52b788', '#e63946'],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });
    }

    renderChart(initialResults);
</script>

</body>
</html>
