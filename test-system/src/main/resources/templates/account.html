<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Налаштування акаунта</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%); min-height: 100vh; }
        .settings-card { background: white; border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); padding: 40px; }
        
        
        .avatar-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%; 
            object-fit: cover; 
            border: 4px solid #8fae87;
        }
        .avatar-placeholder {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #e8f5e9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #8fae87;
            border: 4px solid #8fae87;
        }
        
        .form-control:focus { box-shadow: 0 0 0 3px rgba(143, 174, 135, 0.25); border-color: #8fae87; }
        .btn-save { background-color: #8fae87; color: white; border-radius: 30px; padding: 10px 30px; font-weight: bold; border: none; }
        .btn-save:hover { background-color: #76946f; }
    </style>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍃</text></svg>">
</head>
<body>

<div th:replace="~{navbar :: navbar}"></div>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            
            <div class="settings-card">
                <h2 class="fw-bold mb-4" style="color: #4a574a;">⚙️ Налаштування акаунта</h2>

                <div th:if="${param.success != null}" class="alert alert-success">Зміни успішно збережено!</div>
                <div th:if="${param.passwordError != null}" class="alert alert-danger">Старий пароль введено невірно!</div>

                <form action="/account/update" method="post" enctype="multipart/form-data">
                    
                    
                    <div class="d-flex align-items-center mb-4">
                        
                       
                        <div th:if="${accountUser.avatarUrl != null and !accountUser.avatarUrl.isEmpty()}" class="me-4">
                            <img th:src="${accountUser.avatarUrl}" alt="Avatar" class="avatar-preview shadow-sm">
                        </div>
                        
                        
                        <div th:if="${accountUser.avatarUrl == null or accountUser.avatarUrl.isEmpty()}" class="me-4">
                            <div class="avatar-placeholder shadow-sm">
                                <span th:text="${accountUser.firstName != null ? accountUser.firstName.charAt(0) : '?'}"></span>
                            </div>
                        </div>
                        
                        <div class="flex-grow-1">
                            <label class="form-label fw-bold">Фото профілю</label>
                            <input type="file" name="avatar" class="form-control" accept="image/*">
                            <small class="text-muted">Виберіть файл з комп'ютера (JPG, PNG)</small>
                        </div>
                    </div>

                    <hr class="my-4">

                    
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Ім'я</label>
                            <input type="text" name="firstName" class="form-control" th:value="${accountUser.firstName}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Прізвище</label>
                            <input type="text" name="lastName" class="form-control" th:value="${accountUser.lastName}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Email</label>
                        <input type="email" class="form-control" th:value="${accountUser.email}" disabled>
                        <small class="text-muted">Email не можна змінити.</small>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">🏫 Школа / Університет</label>
                        <input type="text" name="institution" class="form-control" placeholder="Назва вашого навчального закладу" th:value="${accountUser.institution}">
                    </div>

                    <hr class="my-4">

                    
                    <h5 class="fw-bold mb-3">🔒 Зміна паролю</h5>
                    <div class="mb-3">
                        <label class="form-label">Старий пароль</label>
                        <input type="password" name="oldPassword" class="form-control" placeholder="Залиште порожнім, якщо не хочете змінювати">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Новий пароль</label>
                        <input type="password" name="newPassword" class="form-control" placeholder="Введіть новий пароль">
                    </div>

                    <div class="text-end">
                        <button type="submit" class="btn btn-save shadow-sm">ЗБЕРЕГТИ ЗМІНИ</button>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
